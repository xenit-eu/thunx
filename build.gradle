allprojects {
    pluginManager.withPlugin('java-library') {

        configurations {
            // See https://github.com/gradle/gradle/issues/10861
            // To avoid publishing the internal-platform
            internalPlatform {
                visible = false
                canBeConsumed = false
                canBeResolved = false
            }
            annotationProcessor.extendsFrom(internalPlatform)
            compileClasspath.extendsFrom(internalPlatform)
            runtimeClasspath.extendsFrom(internalPlatform)
            testAnnotationProcessor.extendsFrom(internalPlatform)
            testCompileClasspath.extendsFrom(internalPlatform)
            testRuntimeClasspath.extendsFrom(internalPlatform)
        }

        java {
            toolchain {
                languageVersion = JavaLanguageVersion.of(17)
            }
            withSourcesJar()
            withJavadocJar()
        }

        repositories {
            mavenCentral()
        }
    }

    pluginManager.withPlugin('maven-publish') {
        // The nmcp plugin (applied together with maven-publish) resolves its
        // 'nmcpTasks' configuration from the project repositories. Non-java-library
        // publishing projects (e.g. the java-platform bom) don't get repositories
        // from the java-library block above, so declare one here.
        repositories {
            mavenCentral()
        }

        apply from: "${rootDir}/gradle/publish.gradle"
    }
}
